# Gradle properties for AetherMind-Android
# Project-wide Gradle settings

# Required for AndroidX (Compose dependencies)
android.useAndroidX=true
android.enableJetifier=false

# JVM settings
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Gradle parallel and caching
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# AndroidX (non-transitive R class generation)
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# Kotlin
kotlin.code.style=official

# Build performance
org.gradle.daemon=false
org.gradle.warning.mode=summary

# Compose
android.defaults.buildfeatures.buildconfig=false