name: Build AetherMind AT140 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LABEL: AT131_140_FINAL_STABILITY_LOCK
      APP_VERSION: 14.0.0
      VERSION_CODE: 1400
      CORE_VERSION: 7.1
      PACKAGE_NAME: com.aether.renderer
      TELEMETRY_ONLY: TRUE
      AUTO_CONTROL_ENABLED: FALSE
      EXECUTION_ENABLED: FALSE
      SKILL_MODE: PROPOSE_ONLY
      RAW_UI_TEXT_STORED: FALSE
      RAW_UI_TEXT_EXPORTED: FALSE
      EXTERNAL_EXPORT_ALLOWED: FALSE
      APK_OUTPUT_DEBUG: AT140_final_debug.apk
      APK_OUTPUT_RELEASE: AT140_final_release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify lock labels
        shell: bash
        run: |
          grep -q 'LABEL: AT131_140_FINAL_STABILITY_LOCK' BOT_LABEL.txt
          grep -q 'APP_VERSION: 14.0.0' BOT_LABEL.txt
          grep -q 'VERSION_CODE: 1400' BOT_LABEL.txt
          grep -q 'PACKAGE_NAME: com.aether.renderer' BOT_LABEL.txt
          grep -q 'TELEMETRY_ONLY: TRUE' BOT_LABEL.txt
          grep -q 'AUTO_CONTROL_ENABLED: FALSE' BOT_LABEL.txt
          grep -q 'EXECUTION_ENABLED: FALSE' BOT_LABEL.txt
          grep -q 'SKILL_MODE: PROPOSE_ONLY' BOT_LABEL.txt

      - name: Build debug APK
        shell: bash
        run: gradle --no-daemon :app:assembleDebug

      - name: Build release APK
        shell: bash
        run: gradle --no-daemon :app:assembleRelease

      - name: Rename APK outputs
        shell: bash
        run: |
          mkdir -p out
          # Use find to get the actual APK path and rename it to the requested output
          DEBUG_APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          cp "$DEBUG_APK" "out/${APK_OUTPUT_DEBUG}"
          RELEASE_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          cp "$RELEASE_APK" "out/${APK_OUTPUT_RELEASE}"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AT131_140_FINAL_STABILITY_LOCK_APK
          path: out/*.apk
