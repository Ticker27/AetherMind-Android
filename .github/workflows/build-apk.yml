name: Build AetherMind APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APK_OUTPUT_DEBUG: AetherMind_debug.apk
      APK_OUTPUT_RELEASE: AetherMind_release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify project structure
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -d app
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/cpp/CMakeLists.txt
          grep -q 'include(":app")' settings.gradle.kts
          grep -q 'rootProject.name = "AetherMind"' settings.gradle.kts
          grep -q 'namespace = "com.aether.renderer"' app/build.gradle.kts
          grep -q 'com.aethermind.execution.AetherAccessibilityService' app/src/main/AndroidManifest.xml
          grep -q 'aether_execution_core' app/src/main/cpp/CMakeLists.txt

      - name: Check Gradle modules
        shell: bash
        run: gradle --no-daemon projects

      - name: Clean project (remove all build cache)
        shell: bash
        run: |
          rm -rf ~/.gradle/caches
          rm -rf app/build
          gradle --no-daemon clean

      - name: Build debug APK
        shell: bash
        run: gradle --no-daemon :app:assembleDebug --stacktrace

      - name: Build release APK
        shell: bash
        run: gradle --no-daemon :app:assembleRelease --stacktrace

      - name: Collect APK outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          DEBUG_APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          RELEASE_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          test -n "$DEBUG_APK"
          test -n "$RELEASE_APK"
          cp "$DEBUG_APK" "out/${APK_OUTPUT_DEBUG}"
          cp "$RELEASE_APK" "out/${APK_OUTPUT_RELEASE}"
          ls -la out

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AetherMind_APK
          path: out/*.apk
